<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 320" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="320" fill="url(#bg)" rx="12"/>
  <text x="512" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#1e293b">Refrigerant generations timeline</text>
  <line x1="60" y1="200" x2="964" y2="200" stroke="#94a3b8" stroke-width="3"/>
  <!-- Natural -->
  <circle cx="90" cy="200" r="8" fill="#059669"/>
  <text x="90" y="175" text-anchor="middle" font-size="11" fill="#334155">1830s</text>
  <text x="90" y="230" text-anchor="middle" font-size="10" fill="#475569">Natural</text>
  <text x="90" y="245" text-anchor="middle" font-size="9" fill="#64748b">NHā COé</text>
  <!-- CFC -->
  <circle cx="220" cy="200" r="8" fill="#dc2626"/>
  <text x="220" y="175" text-anchor="middle" font-size="11" fill="#334155">1930s</text>
  <text x="220" y="230" text-anchor="middle" font-size="10" fill="#475569">CFC</text>
  <text x="220" y="245" text-anchor="middle" font-size="9" fill="#64748b">R11 R12</text>
  <!-- Montreal -->
  <line x1="340" y1="120" x2="340" y2="200" stroke="#6366f1" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="340" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#4338ca">Montreal 1987</text>
  <!-- HCFC -->
  <circle cx="400" cy="200" r="8" fill="#ea580c"/>
  <text x="400" y="230" text-anchor="middle" font-size="10" fill="#475569">HCFC</text>
  <text x="400" y="245" text-anchor="middle" font-size="9" fill="#64748b">R22</text>
  <!-- HFC -->
  <circle cx="560" cy="200" r="8" fill="#2563eb"/>
  <text x="560" y="175" text-anchor="middle" font-size="11" fill="#334155">1990s</text>
  <text x="560" y="230" text-anchor="middle" font-size="10" fill="#475569">HFC</text>
  <text x="560" y="245" text-anchor="middle" font-size="9" fill="#64748b">R410A R134a</text>
  <!-- Kigali -->
  <line x1="700" y1="120" x2="700" y2="200" stroke="#6366f1" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="700" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#4338ca">Kigali 2016</text>
  <!-- HFO -->
  <circle cx="780" cy="200" r="8" fill="#7c3aed"/>
  <text x="780" y="230" text-anchor="middle" font-size="10" fill="#475569">HFO / blends</text>
  <text x="780" y="245" text-anchor="middle" font-size="9" fill="#64748b">R32 R454B</text>
  <!-- Natural revival -->
  <circle cx="920" cy="200" r="8" fill="#059669"/>
  <text x="920" y="175" text-anchor="middle" font-size="11" fill="#334155">2000s+</text>
  <text x="920" y="230" text-anchor="middle" font-size="10" fill="#475569">Natural revival</text>
  <text x="920" y="245" text-anchor="middle" font-size="9" fill="#64748b">R744 R717 R290</text>
  <!-- parallel track -->
  <path d="M 90 270 Q 512 295 920 270" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
  <text x="512" y="290" text-anchor="middle" font-size="10" fill="#059669">Industrial naturals  continuous parallel track</text>
</svg>
