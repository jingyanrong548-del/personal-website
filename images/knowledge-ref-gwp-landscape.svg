<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 480" role="img" aria-hidden="true">
  <rect width="1024" height="480" fill="#f8fafc" rx="12"/>
  <text x="512" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#1e293b">GWP landscape vs application temperature (schematic)</text>
  <!-- axes -->
  <line x1="80" y1="400" x2="940" y2="400" stroke="#64748b" stroke-width="2"/>
  <line x1="80" y1="400" x2="80" y2="70" stroke="#64748b" stroke-width="2"/>
  <text x="512" y="440" text-anchor="middle" font-size="12" fill="#475569">Application temperature band ’</text>
  <text x="36" y="240" text-anchor="middle" font-size="12" fill="#475569" transform="rotate(-90 36 240)">GWP (100-yr) ’</text>
  <!-- zones -->
  <rect x="100" y="320" width="200" height="70" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="200" y="350" text-anchor="middle" font-size="11" fill="#166534">Natural / HFO</text>
  <text x="200" y="368" text-anchor="middle" font-size="10" fill="#15803d">GWP 0700</text>
  <rect x="340" y="250" width="220" height="90" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="450" y="285" text-anchor="middle" font-size="11" fill="#92400e">Transitional blends</text>
  <text x="450" y="303" text-anchor="middle" font-size="10" fill="#b45309">R32 R454B R515B</text>
  <rect x="600" y="120" width="280" height="120" rx="6" fill="#fee2e2" stroke="#ef4444"/>
  <text x="740" y="165" text-anchor="middle" font-size="11" fill="#991b1b">Legacy HFC (declining)</text>
  <text x="740" y="185" text-anchor="middle" font-size="10" fill="#b91c1c">R410A R134a R245fa</text>
  <!-- app bands -->
  <text x="180" y="420" text-anchor="middle" font-size="10" fill="#334155">Comfort HP</text>
  <text x="450" y="420" text-anchor="middle" font-size="10" fill="#334155">Commercial</text>
  <text x="740" y="420" text-anchor="middle" font-size="10" fill="#334155">Industrial / HTHP</text>
  <!-- arrows -->
  <path d="M 740 250 L 450 300" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 740 250 L 200 340" stroke="#059669" stroke-width="2"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/></marker></defs>
  <text x="512" y="95" text-anchor="middle" font-size="11" fill="#6366f1">Policy-driven transition arrows (not to scale)</text>
</svg>
